<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <meta property="og:title" content="520专属诗句 | 输入名字领取你的诗">

    <title>520 专属诗句</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 35px 25px;
            max-width: 420px;
            width: 100%;
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
        }
        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #fff;
            margin: 0 auto 15px;
            font-size: 36px;
            line-height: 70px;
        }
        .title { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .subtitle { font-size: 14px; opacity: 0.85; margin-bottom: 22px; }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .input-name {
            flex: 1;
            min-width: 160px;
            padding: 14px 18px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.12);
            color: #fff;
            font-size: 16px;
            outline: none;
            font-family: inherit;
            text-align: center;
            transition: all 0.3s;
        }
        .input-name::placeholder {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }
        .input-name:focus {
            border-color: #fff;
            background: rgba(255,255,255,0.22);
            box-shadow: 0 0 12px rgba(255,255,255,0.3);
        }
        .input-name.shake {
            animation: shake 0.4s ease;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            50% { transform: translateX(6px); }
            75% { transform: translateX(-4px); }
        }
        .btn {
            background: #fff;
            color: #ff6b6b;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: transform 0.1s, box-shadow 0.2s, background 0.2s;
            white-space: nowrap;
            font-family: inherit;
        }
        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn:hover {
            background: #fff7f7;
        }
        .result-box {
            margin-top: 10px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }
        .result-box.show {
            opacity: 1;
            transform: translateY(0);
        }
        .result-poem {
            font-size: 21px;
            font-weight: bold;
            margin-bottom: 4px;
            letter-spacing: 1px;
            line-height: 1.5;
        }
        .result-from {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 2px;
        }
        .result-tag {
            display: inline-block;
            background: rgba(255,255,255,0.25);
            border-radius: 12px;
            padding: 2px 12px;
            font-size: 11px;
            opacity: 0.85;
            margin-bottom: 6px;
        }
        .result-insight {
            font-size: 13px;
            opacity: 0.75;
            margin-top: 4px;
            font-style: italic;
        }
        .result-match-char {
            background: rgba(255,255,255,0.3);
            border-radius: 8px;
            padding: 1px 8px;
            font-weight: bold;
            display: inline-block;
            margin: 0 2px;
        }
        .divider {
            width: 40px;
            height: 2px;
            background: rgba(255,255,255,0.4);
            margin: 12px auto;
            border-radius: 1px;
        }
        .small-link {
            display: inline-block;
            margin-top: 16px;
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            text-decoration: underline;
            cursor: pointer;
            transition: color 0.2s;
        }
        .small-link:hover {
            color: #fff;
        }
        .footer { margin-top: 25px; font-size: 12px; opacity: 0.7; }

        /* 花瓣 */
        .petal {
            position: fixed;
            top: -40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            pointer-events: none;
            z-index: 0;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>

            { poem: '心安即是归处', text: '🏡 愿你心有栖息之地', tag: '祝福' },
            { poem: '花看半开，酒饮微醺', text: '🍶 凡事留有余地，才是最好的状态', tag: '祝福' },
            { poem: '今天的好心情是限定的', text: '🌈 请及时查收', tag: '祝福' },
            { poem: '种一棵树最好的时间是十年前，其次是现在', text: '🌳 想做就去做，永远不晚', tag: '祝福' },
            { poem: '温柔是宝藏，你也是', text: '💎 愿你永远被珍惜', tag: '祝福' },
            { poem: '慢慢来，会好的', text: '🌿 生活总会给你不期而遇的温暖', tag: '祝福' },
        ];

        // ==================== 构建反向索引（字符 → 诗句索引数组） ====================
        const charIndex = {};
        wishes.forEach((wish, idx) => {
            // 合并诗句和出处，只保留中文字符
            const combined = (wish.poem + wish.text).replace(/[^\u4e00-\u9fa5]/g, '');
            const chars = new Set(combined.split(''));
            chars.forEach(ch => {
                if (!charIndex[ch]) charIndex[ch] = [];
                charIndex[ch].push(idx);
            });
        });

        // ==================== 核心匹配函数 ====================
        function matchName(name) {
            if (!name || name.trim().length === 0) return null;
            name = name.trim();

            // 取最后一个中文字符
            let char = '';
            for (let i = name.length - 1; i >= 0; i--) {
                if (/[\u4e00-\u9fa5]/.test(name[i])) {
                    char = name[i];
                    break;
                }
            }
            // 如果没找到中文，取第一个字符（英文名场景）
            if (!char) char = name[0];

            let indices = charIndex[char];
            let matched = false;
            let matchedChar = char;

            // 如果最后一个字没匹配到，尝试第一个字
            if (!indices || indices.length === 0) {
                let firstChar = '';
                for (let i = 0; i < name.length; i++) {
                    if (/[\u4e00-\u9fa5]/.test(name[i])) {
                        firstChar = name[i];
                        break;
                    }
                }
                if (firstChar && firstChar !== char) {
                    indices = charIndex[firstChar];
                    matchedChar = firstChar;
                }
            }

            if (indices && indices.length > 0) {
                matched = true;
                const idx = indices[Math.floor(Math.random() * indices.length)];
                return { wish: wishes[idx], matchedChar, matched };
            } else {
                // 无匹配，根据名字 hash 选一条
                let hash = 0;
                for (let i = 0; i < name.length; i++) {
                    hash = ((hash << 5) - hash) + name.charCodeAt(i);
                    hash |= 0;
                }
                const idx = Math.abs(hash) % wishes.length;
                return { wish: wishes[idx], matchedChar: null, matched: false };
            }
        }

        // ==================== 生成解读文案 ====================
        function generateInsight(name, matchedChar, matched, isDouble) {
            if (matched && matchedChar) {
                const templates = [
                    `你名字中的「${matchedChar}」字，与这句诗意境相合`,
                    `「${matchedChar}」——这个字带着诗意，恰如为你而写`,
                    `诗中有「${matchedChar}」，正如你名字中的韵味`,
                    `古人笔下的「${matchedChar}」，今天遇见了你`,
                ];
                return templates[Math.floor(Math.random() * templates.length)];
            } else if (!matched) {
                const templates = [
                    `你的名字太独特了，我们为你特别挑选了这句`,
                    `独一无二的名字，配这句独一无二的诗`,
                    `虽未找到直接关联，但这句诗的气质与你很搭`,
                ];
                return templates[Math.floor(Math.random() * templates.length)];
            }
            return '';
        }

        // ==================== 主函数：生成专属诗句 ====================
        function generatePoem() {
            const inputEl = document.getElementById('nameInput');
            const rawName = inputEl.value.trim();

            if (!rawName) {
                inputEl.classList.add('shake');
                setTimeout(() => inputEl.classList.remove('shake'), 400);
                return;
            }

            // 检测双人名字（分隔符：和、与、&、+、/、,、，、空格）
            const separators = /[和与&+\/,，\s]+/;
            const parts = rawName.split(separators).filter(s => s.trim().length > 0);

            let resultHTML = '';
            let insightText = '';

            if (parts.length >= 2) {
                // 双人模式
                const name1 = parts[0].trim();
                const name2 = parts[1].trim();

                const match1 = matchName(name1);
                const match2 = matchName(name2);

                // 尝试找交集（同时包含两个匹配字的诗句）
                let commonIdx = -1;
                if (match1.matched && match2.matched) {
                    const idx1 = charIndex[match1.matchedChar];
                    const idx2 = charIndex[match2.matchedChar];
                    const common = idx1.filter(i => idx2.includes(i));
                    if (common.length > 0) {
                        commonIdx = common[Math.floor(Math.random() * common.length)];
                    }
                }

                if (commonIdx !== -1) {
                    // 缘分诗句：同一句诗同时关联两个人的名字
                    const w = wishes[commonIdx];
                    resultHTML = `
                        <p class="result-poem">${w.poem}</p>
                        <p class="result-from">${w.text}</p>
                        <span class="result-tag" style="display:inline-block;">${w.tag}</span>
                    `;
                    insightText = `「${name1}」与「${name2}」的名字共同指向这句诗——缘分妙不可言 ✨`;
                } else {
                    // 分别显示各自的诗句
                    const w1 = match1.wish;
                    const w2 = match2.wish;
                    resultHTML = `
                        <p style="font-size:14px;opacity:0.8;margin-bottom:2px;">${name1}的诗句</p>
                        <p class="result-poem" style="font-size:18px;">${w1.poem}</p>
                        <p class="result-from">${w1.text}</p>
                        <span class="result-tag" style="display:inline-block;">${w1.tag}</span>
                        <div class="divider">❤️</div>
                        <p style="font-size:14px;opacity:0.8;margin-bottom:2px;">${name2}的诗句</p>
                        <p class="result-poem" style="font-size:18px;">${w2.poem}</p>
                        <p class="result-from">${w2.text}</p>
                        <span class="result-tag" style="display:inline-block;">${w2.tag}</span>
                    `;
                    insightText = `两句诗，两个人，一段故事正在开始 🌸`;
                }

            } else {
                // 单人模式
                const name = parts[0];
                const match = matchName(name);
                const w = match.wish;

                resultHTML = `
                    <p class="result-poem">${w.poem}</p>
                    <p class="result-from">${w.text}</p>
                    <span class="result-tag" style="display:inline-block;">${w.tag}</span>
                `;
                insightText = generateInsight(name, match.matchedChar, match.matched, false);
            }

            // 渲染结果
            const resultBox = document.getElementById('resultBox');
            resultBox.innerHTML = resultHTML + `<p class="result-insight">${insightText}</p>`;
            resultBox.classList.add('show');

            // 轻弹动画
            const card = document.getElementById('card');
            card.style.transform = 'scale(1.02)';
            setTimeout(() => { card.style.transform = 'scale(1)'; }, 150);
        }

        // ==================== 随机祝福（保留原功能） ====================
        function randomPoem() {
            const w = wishes[Math.floor(Math.random() * wishes.length)];
            const resultBox = document.getElementById('resultBox');
            resultBox.innerHTML = `
                <p class="result-poem">${w.poem}</p>
                <p class="result-from">${w.text}</p>
                <span class="result-tag" style="display:inline-block;">${w.tag}</span>
                <p class="result-insight">随意抽选的诗句，或许也是命运的提示 🌙</p>
            `;
            resultBox.classList.add('show');
            document.getElementById('nameInput').value = '';

            const card = document.getElementById('card');
            card.style.transform = 'scale(1.02)';
            setTimeout(() => { card.style.transform = 'scale(1)'; }, 150);
        }

        // ==================== 回车键触发 ====================
        document.getElementById('nameInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                generatePoem();
            }
        });

        // ==================== 页面加载时显示一句默认祝福 ====================
        randomPoem();
    </script>
</body>
