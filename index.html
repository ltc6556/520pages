<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="520专属诗句 | 输入名字领取你的诗">
    <meta property="og:description" content="输入名字，从万首古诗词中为你匹配专属诗句。">
    <title>520 专属诗句</title>
    <style>
        :root {
            --bg-hue: 0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ============ 背景：动态渐变 + 光球层 ============ */
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #fff;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            /* 底层渐变 - 缓慢变化 */
            background: linear-gradient(
                135deg,
                #2d1b3d 0%,
                #5c2d4f 20%,
                #8b3a5e 40%,
                #c44d6e 60%,
                #e8617c 80%,
                #ff7b8a 100%
            );
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
        }
        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            25%  { background-position: 100% 0%; }
            50%  { background-position: 100% 100%; }
            75%  { background-position: 0% 100%; }
            100% { background-position: 0% 50%; }
        }

        /* 漂浮光球 */
        .orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(30px);
            opacity: 0.4;
            animation: orbFloat linear infinite;
        }
        @keyframes orbFloat {
            0%   { transform: translate(0, 0) scale(1); opacity: 0.3; }
            25%  { transform: translate(60px, -40px) scale(1.3); opacity: 0.5; }
            50%  { transform: translate(-30px, -80px) scale(0.8); opacity: 0.35; }
            75%  { transform: translate(-60px, -20px) scale(1.2); opacity: 0.45; }
            100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
        }

        /* 飘落花瓣 */
        .petal {
            position: fixed;
            top: -50px;
            pointer-events: none;
            z-index: 0;
            animation: petalFall linear infinite;
            border-radius: 50% 0 50% 0;
        }
        @keyframes petalFall {
            0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.9; }
            20%  { transform: translateY(20vh) rotate(72deg) scale(1.1); opacity: 0.8; }
            40%  { transform: translateY(40vh) rotate(144deg) scale(0.9); opacity: 0.7; }
            60%  { transform: translateY(60vh) rotate(216deg) scale(1.05); opacity: 0.5; }
            80%  { transform: translateY(80vh) rotate(288deg) scale(0.85); opacity: 0.3; }
            100% { transform: translateY(105vh) rotate(360deg) scale(0.7); opacity: 0; }
        }

        /* 小光点 */
        .sparkle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: sparkleFloat linear infinite;
        }
        @keyframes sparkleFloat {
            0%   { transform: translateY(0) scale(1); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.8; }
            100% { transform: translateY(-100vh) scale(0); opacity: 0; }
        }

        /* ============ 卡片 ============ */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.10);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 35px 25px;
            max-width: 440px;
            width: 100%;
            transition: transform 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow:
                0 8px 40px rgba(0,0,0,0.2),
                0 0 80px rgba(255,120,150,0.1),
                inset 0 1px 0 rgba(255,255,255,0.15);
        }
        .card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 26px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.05), rgba(255,255,255,0.2));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            animation: borderGlow 4s ease-in-out infinite;
        }
        @keyframes borderGlow {
            0%,100% { opacity: 0.6; }
            50%     { opacity: 1; }
        }

        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            margin: 0 auto 15px;
            font-size: 36px;
            line-height: 70px;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .title { font-size: 26px; font-weight: bold; margin-bottom: 5px; letter-spacing: 2px; }
        .subtitle { font-size: 14px; opacity: 0.8; margin-bottom: 22px; }

        /* 输入区域 */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .input-name {
            flex: 1;
            min-width: 160px;
            padding: 14px 18px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.10);
            backdrop-filter: blur(10px);
            color: #fff;
            font-size: 16px;
            outline: none;
            font-family: inherit;
            text-align: center;
            transition: all 0.3s;
            letter-spacing: 1px;
        }
        .input-name::placeholder {
            color: rgba(255,255,255,0.55);
            font-size: 14px;
            letter-spacing: 1px;
        }
        .input-name:focus {
            border-color: rgba(255,255,255,0.8);
            background: rgba(255,255,255,0.18);
            box-shadow: 0 0 20px rgba(255,255,255,0.15);
        }
        .input-name.shake {
            animation: shake 0.4s ease;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            50% { transform: translateX(6px); }
            75% { transform: translateX(-4px); }
        }

        .btn {
            background: rgba(255,255,255,0.9);
            color: #c44d6e;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            white-space: nowrap;
            font-family: inherit;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .btn:hover {
            background: #fff;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        /* 结果区域 */
        .result-box {
            margin-top: 10px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }
        .result-box.show {
            opacity: 1;
            transform: translateY(0);
        }
        .result-poem {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 4px;
            letter-spacing: 2px;
            line-height: 1.6;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .result-from {
            font-size: 13px;
            opacity: 0.75;
            margin-bottom: 2px;
        }
        .result-tag {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 2px 12px;
            font-size: 11px;
            opacity: 0.85;
            margin-bottom: 6px;
            backdrop-filter: blur(5px);
        }
        .result-tag.api-tag {
            background: rgba(100,255,200,0.25);
            border: 1px solid rgba(100,255,200,0.4);
        }
        .result-insight {
            font-size: 13px;
            opacity: 0.72;
            margin-top: 4px;
            font-style: italic;
        }
        .divider {
            width: 40px;
            height: 2px;
            background: rgba(255,255,255,0.3);
            margin: 12px auto;
            border-radius: 1px;
        }

        .small-links {
            margin-top: 16px;
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .small-link {
            display: inline-block;
            font-size: 13px;
            color: rgba(255,255,255,0.75);
            text-decoration: underline;
            cursor: pointer;
            transition: color 0.2s;
        }
        .small-link:hover { color: #fff; }
        .small-link.loading {
            opacity: 0.5;
            pointer-events: none;
        }

        .api-hint {
            font-size: 11px;
            opacity: 0.55;
            margin-top: 6px;
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            opacity: 0.55;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>

    <!-- ============== 动态背景层（JS 生成） ============== -->
    <div id="bgContainer"></div>

    <div class="card" id="card">
        <div class="avatar" id="avatarIcon">📜</div>

        <div class="result-box" id="resultBox">

        <p class="api-hint" id="apiHint">

    <div class="footer">一份来自朋友的节日祝福 · 不涉及任何商业行为</div>

            { poem: '东边日出西边雨，道是无晴却有晴', text: '—— 刘禹锡《竹枝词》', tag: '古诗' },
            { poem: '愿君多采撷，此物最相思', text: '—— 王维《相思》', tag: '古诗' },
            { poem: '还君明珠双泪垂，恨不相逢未嫁时', text: '—— 张籍《节妇吟》', tag: '古诗' },
            { poem: '取次花丛懒回顾，半缘修道半缘君', text: '—— 元稹《离思》', tag: '古诗' },
            { poem: '春心莫共花争发，一寸相思一寸灰', text: '—— 李商隐《无题》', tag: '古诗' },
        ];

        // ==================== 云端诗词（从 API 获取的额外池） ====================
        const apiWishes = [];

        // ==================== 合并池 & 反向索引 ====================
        function getAllWishes() {
            return [...localWishes, ...apiWishes];
        }

        function buildCharIndex() {
            const idx = {};
            const all = getAllWishes();
            all.forEach((wish, i) => {
                const combined = (wish.poem + wish.text).replace(/[^\u4e00-\u9fa5]/g, '');
                const chars = new Set(combined.split(''));
                chars.forEach(ch => {
                    if (!idx[ch]) idx[ch] = [];
                    idx[ch].push(i);
                });
            });
            return idx;
        }

        let charIndex = buildCharIndex();

        // ==================== 从 API 获取诗句 ====================
        async function fetchOneFromAPI() {
            const linkEl = document.getElementById('linkApi');
            const hintEl = document.getElementById('apiHint');

            linkEl.classList.add('loading');
            hintEl.textContent = '正在从云端诗词库取诗……';

            try {
                const resp = await fetch('https://v1.jinrishici.com/all.json', {
                    signal: AbortSignal.timeout(5000)
                });
                const data = await resp.json();
                if (data && data.content) {
                    const newPoem = {
                        poem: data.content,
                        text: `—— ${data.author}《${data.origin}》`,
                        tag: '云端·古诗',
                        fromAPI: true
                    };
                    apiWishes.push(newPoem);
                    charIndex = buildCharIndex();

                    // 直接展示这首
                    displayResult(newPoem, '🌐 来自云端诗词库，实时获取');
                    hintEl.textContent = `✅ 已从云端获取！当前共 ${getAllWishes().length} 句诗词`;
                    linkEl.classList.remove('loading');
                    return newPoem;
                }
            } catch (e) {
                console.warn('API 请求失败，使用本地诗词', e);
            }

            hintEl.textContent = '⚠️ 云端暂时无法连接，使用本地诗词库';
            linkEl.classList.remove('loading');
            // 降级：随机本地
            const w = localWishes[Math.floor(Math.random() * localWishes.length)];
            displayResult(w, '（云端暂不可用，来自本地诗词库）');
            return w;
        }

        // ==================== 显示结果 ====================
        function displayResult(wish, extraInsight) {
            const resultBox = document.getElementById('resultBox');
            const tagExtra = wish.fromAPI ? ' api-tag' : '';

            resultBox.innerHTML = `
                <p class="result-poem">${wish.poem}</p>
                <p class="result-from">${wish.text}</p>
                <span class="result-tag${tagExtra}" style="display:inline-block;">${wish.tag}</span>
                <p class="result-insight">${extraInsight || ''}</p>
            `;
            resultBox.classList.add('show');

            const card = document.getElementById('card');
            card.style.transform = 'scale(1.02)';
            setTimeout(() => { card.style.transform = 'scale(1)'; }, 150);
        }

        // ==================== 名字匹配 ====================
        function matchName(name) {
            if (!name || name.trim().length === 0) return null;
            name = name.trim();
            const allWishes = getAllWishes();
            if (allWishes.length === 0) return null;

            let char = '';
            for (let i = name.length - 1; i >= 0; i--) {
                if (/[\u4e00-\u9fa5]/.test(name[i])) { char = name[i]; break; }
            }
            if (!char) char = name[0];

            let indices = charIndex[char];
            let matchedChar = char;

            if (!indices || indices.length === 0) {
                let firstChar = '';
                for (let i = 0; i < name.length; i++) {
                    if (/[\u4e00-\u9fa5]/.test(name[i])) { firstChar = name[i]; break; }
                }
                if (firstChar && firstChar !== char) {
                    indices = charIndex[firstChar];
                    matchedChar = firstChar;
                }
            }

            if (indices && indices.length > 0) {
                const idx = indices[Math.floor(Math.random() * indices.length)];
                return { wish: allWishes[idx], matchedChar, matched: true };
            } else {
                let hash = 0;
                for (let i = 0; i < name.length; i++) {
                    hash = ((hash << 5) - hash) + name.charCodeAt(i); hash |= 0;
                }
                const idx = Math.abs(hash) % allWishes.length;
                return { wish: allWishes[idx], matchedChar: null, matched: false };
            }
        }

        function generateInsight(name, matchedChar, matched) {
            if (matched && matchedChar) {
                const t = [
                    `你名字中的「${matchedChar}」字，与这句诗意境相合`,
                    `「${matchedChar}」——这个字带着诗意，恰如为你而写`,
                    `诗中有「${matchedChar}」，正如你名字中的韵味`,
                    `古人笔下的「${matchedChar}」，今天遇见了你`,
                ];
                return t[Math.floor(Math.random() * t.length)];
            } else {
                const t = [
                    '你的名字太独特了，我们为你特别挑选了这句',
                    '独一无二的名字，配这句独一无二的诗',
                    '虽未找到直接关联，但这句诗的气质与你很搭',
                ];
                return t[Math.floor(Math.random() * t.length)];
            }
        }

        // ==================== 主函数 ====================
        function generatePoem() {
            const inputEl = document.getElementById('nameInput');
            const rawName = inputEl.value.trim();
            if (!rawName) {
                inputEl.classList.add('shake');
                setTimeout(() => inputEl.classList.remove('shake'), 400);
                return;
            }

            const separators = /[和与&+\/,，\s]+/;
            const parts = rawName.split(separators).filter(s => s.trim().length > 0);

            if (parts.length >= 2) {
                const name1 = parts[0].trim();
                const name2 = parts[1].trim();
                const m1 = matchName(name1);
                const m2 = matchName(name2);

                let commonIdx = -1;
                if (m1 && m2 && m1.matched && m2.matched) {
                    const idx1 = charIndex[m1.matchedChar];
                    const idx2 = charIndex[m2.matchedChar];
                    if (idx1 && idx2) {
                        const common = idx1.filter(i => idx2.includes(i));
                        if (common.length > 0) commonIdx = common[Math.floor(Math.random() * common.length)];
                    }
                }

                const allWishes = getAllWishes();
                const resultBox = document.getElementById('resultBox');

                if (commonIdx !== -1) {
                    const w = allWishes[commonIdx];
                    resultBox.innerHTML = `
                        <p class="result-poem">${w.poem}</p>
                        <p class="result-from">${w.text}</p>
                        <span class="result-tag${w.fromAPI ? ' api-tag' : ''}" style="display:inline-block;">${w.tag}</span>
                        <p class="result-insight">「${name1}」与「${name2}」的名字共同指向这句诗——缘分妙不可言 ✨</p>
                    `;
                } else if (m1 && m2) {
                    const w1 = m1.wish;
                    const w2 = m2.wish;
                    resultBox.innerHTML = `
                        <p style="font-size:13px;opacity:0.75;margin-bottom:2px;">${name1}的诗句</p>
                        <p class="result-poem" style="font-size:18px;">${w1.poem}</p>
                        <p class="result-from">${w1.text}</p>
                        <span class="result-tag${w1.fromAPI ? ' api-tag' : ''}" style="display:inline-block;">${w1.tag}</span>
                        <div class="divider">❤️</div>
                        <p style="font-size:13px;opacity:0.75;margin-bottom:2px;">${name2}的诗句</p>
                        <p class="result-poem" style="font-size:18px;">${w2.poem}</p>
                        <p class="result-from">${w2.text}</p>
                        <span class="result-tag${w2.fromAPI ? ' api-tag' : ''}" style="display:inline-block;">${w2.tag}</span>
                        <p class="result-insight">两句诗，两个人，一段故事正在开始 🌸</p>
                    `;
                }
                resultBox.classList.add('show');
            } else {
                const m = matchName(parts[0]);
                if (!m) return;
                const insight = generateInsight(parts[0], m.matchedChar, m.matched);
                displayResult(m.wish, insight);
            }

            const card = document.getElementById('card');
            card.style.transform = 'scale(1.02)';
            setTimeout(() => { card.style.transform = 'scale(1)'; }, 150);
        }

        // ==================== 随机本地 ====================
        function randomLocal() {
            const w = localWishes[Math.floor(Math.random() * localWishes.length)];
            displayResult(w, '从本地诗词库中随机抽取 🌙');
            document.getElementById('nameInput').value = '';
        }

        // ==================== 初始化：预加载云端诗词 ====================
        async function preloadAPI() {
            const hintEl = document.getElementById('apiHint');
            hintEl.textContent = '正在从云端诗词库预加载……';
            let loaded = 0;
            for (let i = 0; i < 5; i++) {
                try {
                    const resp = await fetch('https://v1.jinrishici.com/all.json', {
                        signal: AbortSignal.timeout(4000)
                    });
                    const data = await resp.json();
                    if (data && data.content) {
                        apiWishes.push({
                            poem: data.content,
                            text: `—— ${data.author}《${data.origin}》`,
                            tag: '云端·古诗',
                            fromAPI: true
                        });
                        loaded++;
                    }
                } catch (e) { break; }
                // 小间隔，避免请求过快
                await new Promise(r => setTimeout(r, 300));
            }
            charIndex = buildCharIndex();
            const total = getAllWishes().length;
            if (loaded > 0) {
                hintEl.textContent = `✅ 云端诗词已就绪！当前共 ${total} 句诗词（含 ${loaded} 句云端诗句）`;
            } else {
                hintEl.textContent = `⚠️ 云端暂不可用，当前使用本地 ${localWishes.length} 句诗词`;
            }
        }

        // ==================== 回车触发 ====================
        document.getElementById('nameInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') generatePoem();
        });

        // ==================== 启动 ====================
        randomLocal();
        preloadAPI();
    </script>
