<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="520快乐，送你一份心意 ❤️">
    <meta property="og:description" content="点击查收你的专属祝福">
    <title>520专属心意</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 380px;
            width: 100%;
            transition: transform 0.2s;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #fff;
            margin: 0 auto 20px;
            font-size: 40px;
            line-height: 80px;
        }
        .title { font-size: 24px; margin-bottom: 10px; }
        .subtitle { font-size: 16px; opacity: 0.9; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            background: #fff;
            color: #ff6b6b;
            padding: 14px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .wish-box {
            margin-top: 20px;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .wish-poem {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .wish-text {
            font-size: 16px;
            opacity: 0.9;
        }
        .footer { margin-top: 30px; font-size: 12px; opacity: 0.7; }
        .tag {
            display: inline-block;
            background: rgba(255,255,255,0.25);
            border-radius: 12px;
            padding: 2px 12px;
            font-size: 11px;
            margin-top: 8px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar" id="avatarIcon">🎁</div>
        <div class="title">520 快乐 ❤️</div>
        <div class="subtitle">你是今天第 <span id="count">??</span> 位收到祝福的人</div>
        <button class="btn" onclick="showWish()">✨ 打开心意 ✨</button>
        <div class="wish-box" id="wishBox">
            <p class="wish-poem" id="wishPoem"></p>
            <p class="wish-text" id="wishText"></p>
            <span class="tag" id="wishTag" style="display:none;"></span>
        </div>
    </div>
    <div class="footer">一份来自朋友的节日祝福 · 不涉及任何商业行为</div>

    <script>
        // ==================== 随机序号 ====================
        document.getElementById('count').innerText = Math.floor(Math.random() * 5000 + 100);

        // ==================== 随机头像 Emoji ====================
        const avatars = ['🎁', '💝', '🌹', '💌', '🕊️', '✨', '🌸', '💫', '🎀', '❤️'];
        document.getElementById('avatarIcon').innerText = avatars[Math.floor(Math.random() * avatars.length)];

        // ==================== 祝福语库（诗句 + 现代祝福混合） ====================
        const wishes = [

            // --- 古诗词经典 ---
            { poem: '愿得一心人，白头不相离', text: '—— 卓文君《白头吟》', tag: '古诗' },
            { poem: '山有木兮木有枝，心悦君兮君不知', text: '—— 《越人歌》', tag: '古诗' },
            { poem: '曾经沧海难为水，除却巫山不是云', text: '—— 元稹《离思》', tag: '古诗' },
            { poem: '两情若是久长时，又岂在朝朝暮暮', text: '—— 秦观《鹊桥仙》', tag: '古诗' },
            { poem: '执子之手，与子偕老', text: '—— 《诗经·邶风》', tag: '古诗' },
            { poem: '在天愿作比翼鸟，在地愿为连理枝', text: '—— 白居易《长恨歌》', tag: '古诗' },
            { poem: '身无彩凤双飞翼，心有灵犀一点通', text: '—— 李商隐《无题》', tag: '古诗' },
            { poem: '玲珑骰子安红豆，入骨相思知不知', text: '—— 温庭筠《南歌子》', tag: '古诗' },
            { poem: '只愿君心似我心，定不负相思意', text: '—— 李之仪《卜算子》', tag: '古诗' },
            { poem: '金风玉露一相逢，便胜却人间无数', text: '—— 秦观《鹊桥仙》', tag: '古诗' },
            { poem: '问世间情为何物，直教生死相许', text: '—— 元好问《摸鱼儿》', tag: '古诗' },
            { poem: '天涯地角有穷时，只有相思无尽处', text: '—— 晏殊《玉楼春》', tag: '古诗' },
            { poem: '愿我如星君如月，夜夜流光相皎洁', text: '—— 范成大《车遥遥篇》', tag: '古诗' },
            { poem: '得成比目何辞死，愿作鸳鸯不羡仙', text: '—— 卢照邻《长安古意》', tag: '古诗' },
            { poem: '死生契阔，与子成说', text: '—— 《诗经·邶风》', tag: '古诗' },
            { poem: '相思相见知何日，此时此夜难为情', text: '—— 李白《三五七言》', tag: '古诗' },
            { poem: '衣带渐宽终不悔，为伊消得人憔悴', text: '—— 柳永《蝶恋花》', tag: '古诗' },
            { poem: '君当作磐石，妾当作蒲苇', text: '—— 《孔雀东南飞》', tag: '古诗' },
            { poem: '此情可待成追忆，只是当时已惘然', text: '—— 李商隐《锦瑟》', tag: '古诗' },
            { poem: '平生不会相思，才会相思，便害相思', text: '—— 徐再思《折桂令》', tag: '古诗' },

            // --- 现代情诗 / 歌词 ---
            { poem: '春风十里不如你', text: '—— 冯唐', tag: '现代诗' },
            { poem: '世间安得双全法，不负如来不负卿', text: '—— 仓央嘉措', tag: '现代诗' },
            { poem: '你见，或者不见我，我就在那里', text: '—— 仓央嘉措', tag: '现代诗' },
            { poem: '所有的相遇，都是久别重逢', text: '—— 佚名', tag: '现代诗' },
            { poem: '你是我这一生等了半世未拆的礼物', text: '—— 佚名', tag: '现代诗' },
            { poem: '我行过许多地方的桥，却只爱过一个正当最好年龄的人', text: '—— 沈从文', tag: '现代诗' },
            { poem: '海底月是天上月，眼前人是心上人', text: '—— 张爱玲', tag: '现代诗' },
            { poem: '既见君子，云胡不喜', text: '—— 《诗经》（现代传诵）', tag: '现代诗' },
            { poem: '今晚月色真美', text: '—— 夏目漱石', tag: '现代诗' },
            { poem: '你是人间四月天', text: '—— 林徽因', tag: '现代诗' },

            // --- 温暖祝福 ---
            { poem: '愿你有人爱，有事做，有所期待', text: '✨ 这世界总有一盏灯为你而亮', tag: '祝福' },
            { poem: '所有的浪漫，你都值得', text: '🌹 今天记得给自己买束花', tag: '祝福' },
            { poem: '别急，对的人正在路上', text: '🚶 在他来之前，请替我们照顾好自己', tag: '祝福' },
            { poem: '先爱自己，再爱世界', text: '💖 你是自己人生的主角', tag: '祝福' },
            { poem: '今天记得给自己买份好吃的', text: '🍰 生活很苦，但你很甜', tag: '祝福' },
            { poem: '你值得被温柔以待', text: '🌸 无论今天有没有人陪你', tag: '祝福' },
            { poem: '爱不是占有，是彼此照亮', text: '💡 愿你成为自己的光', tag: '祝福' },
            { poem: '520，别忘了爱自己', text: '🫂 你是独一无二的存在', tag: '祝福' },
            { poem: '幸福不是什么都拥有，而是想要的恰好在身边', text: '🏠 珍惜当下，即是圆满', tag: '祝福' },
            { poem: '万物皆有裂痕，那是光照进来的地方', text: '🍃 —— 莱昂纳德·科恩', tag: '祝福' },
            { poem: '今天允许你做一个幸福的人', text: '🌞 喂马、劈柴、周游世界……先从吃顿好的开始', tag: '祝福' },
            { poem: '世上只有一种英雄主义', text: '🦸 就是看清生活的真相之后依然热爱生活', tag: '祝福' },
        ];

        // ==================== 点击显示祝福 ====================
        function showWish() {
            // 随机选一条（防止连续两次相同）
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * wishes.length);
            } while (newIndex === showWish.lastIndex && wishes.length > 1);
            showWish.lastIndex = newIndex;

            const w = wishes[newIndex];

            document.getElementById('wishPoem').innerText = w.poem;
            document.getElementById('wishText').innerText = w.text;
            
            const tagEl = document.getElementById('wishTag');
            tagEl.innerText = w.tag;
            tagEl.style.display = 'inline-block';

            // 轻弹动画
            const card = document.querySelector('.card');
            card.style.transform = 'scale(1.02)';
            setTimeout(() => { card.style.transform = 'scale(1)'; }, 150);
        }

        // 记录上一次索引（避免连续重复）
        showWish.lastIndex = -1;

        // ==================== 页面加载时自动显示一条 ====================
        showWish();
    </script>
</body>
</html>
